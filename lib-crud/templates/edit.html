<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 24px; }
    .form-card { background: #fff; border-radius: 18px; padding: 40px 36px;
                 box-shadow: 0 8px 32px rgba(124,58,237,.13); width: 100%; max-width: 480px; }
    .form-card h2 { color: #1e1b4b; }
    .form-control:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.15); }
    .btn-submit { background: linear-gradient(135deg, #4f46e5, #7c3aed);
                  border: none; border-radius: 10px; padding: 11px; font-weight: 700; }
    .btn-submit:hover { opacity: .9; }
    .accent-bar { height: 5px; border-radius: 4px;
                  background: linear-gradient(90deg, #7c3aed, #4f46e5); margin-bottom: 28px; }
  </style>
</head>
<body>
  <div class="form-card">
    <div class="accent-bar"></div>
    <div class="d-flex align-items-center gap-2 mb-4">
      <a href="{{ url_for('home') }}" class="text-muted text-decoration-none">
        <i class="bi bi-arrow-left fs-5"></i>
      </a>
      <h2 class="fw-bold mb-0">Edit Book</h2>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} rounded-3 py-2 mb-3">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('edit', book_id=book.id) }}">
      <div class="mb-3">
        <label class="form-label fw-semibold" for="title">Title</label>
        <input type="text" class="form-control" id="title" name="title"
               value="{{ book.title }}" required />
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" for="author">Author</label>
        <input type="text" class="form-control" id="author" name="author"
               value="{{ book.author }}" required />
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" for="rating">Rating <span class="text-muted fw-normal">(0 – 10)</span></label>
        <input type="number" class="form-control" id="rating" name="rating"
               min="0" max="10" step="0.1" value="{{ book.rating }}" required />
      </div>
      <button type="submit" class="btn btn-primary btn-submit w-100 text-white">
        <i class="bi bi-check-lg me-1"></i> Save Changes
      </button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
