<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Watchlist{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="site-shell">
        <header class="topbar">
            <a class="brand" href="{{ url_for('pages.home') }}">
                <span class="brand-mark">FILM</span>
                <span class="brand-text">Watchlist</span>
            </a>

            <nav class="nav-links" aria-label="Primary">
                <a href="{{ url_for('pages.home') }}">Home</a>
                <a href="{{ url_for('pages.movies') }}">Movies</a>
                <a href="{{ url_for('pages.new_movie') }}">Add Movie</a>
                <a href="{{ url_for('pages.login') }}">Log In</a>
                <a href="{{ url_for('pages.signup') }}">Sign Up</a>
                <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">Theme</button>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <p>Curated for movie nights. {{ current_year }}</p>
            <p>{{ watched_count }} titles tracked. Average rating {{ average_rating }}/5.</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
