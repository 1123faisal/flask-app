services:
  - type: web
    name: flask-blog
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install uv && uv sync --frozen
    startCommand: .venv/bin/gunicorn main:app
    envVars:
      - key: MAIL_ADDRESS
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
