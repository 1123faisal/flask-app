{% extends 'base.html' %}

{% block title %}Guessing Game{% endblock %}

{% block content %}
  <div class="container py-5" style="max-width:540px;">
    <div class="card border-0 shadow-sm rounded-4 p-4 text-center">
      <h1 class="h3 mb-3 fw-bold">Guessing Game</h1>
      <p class="text-muted mb-2">Hi <strong>{{ name.title() }}</strong>!</p>
      <p class="mb-0">Predicted gender: <span class="badge rounded-pill bg-primary px-3 py-2">{{ gender.title() }}</span></p>
    </div>
    <div class="text-center mt-4">
      <a href="/" class="text-decoration-none text-secondary">&larr; Back to CV</a>
    </div>
  </div>
{% endblock %}
