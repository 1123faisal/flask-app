<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} | Faisal's Blogs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <div class="texture"></div>
  <main class="shell">
    <header class="site-head">
      <h1>Faisal's Blogs</h1>
      <nav class="nav" aria-label="Primary">
        <a href="{{ url_for('index') }}" class="{% if request.path == '/' %}active{% endif %}">Projects</a>
        <a href="{{ url_for('about') }}" class="{% if request.path == '/about' %}active{% endif %}">About</a>
        <a href="{{ url_for('contact') }}" class="{% if request.path == '/contact' %}active{% endif %}">Contact</a>
        {% if session.get("email") %}
        <a href="{{ url_for('protected') }}" class="{% if request.path == '/protected' %}active{% endif %}">Dashboard</a>
        <form method="post" action="{{ url_for('logout') }}" style="display:contents">
          <button type="submit" class="nav-logout">Sign out</button>
        </form>
        {% else %}
        <a href="{{ url_for('login_page') }}" class="{% if request.path == '/login' %}active{% endif %}">Log in</a>
        <a href="{{ url_for('signup_page') }}" class="{% if request.path == '/signup' %}active{% endif %}">Sign up</a>
        {% endif %}
      </nav>
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash-bar" role="alert">
            {% for msg in messages %}<span>{{ msg }}</span>{% endfor %}
          </div>
        {% endif %}
      {% endwith %}
    </header>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
