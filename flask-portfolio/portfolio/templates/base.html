<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }} | Bob Smith</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
  <div class="texture"></div>
  <main class="shell">
    <header class="site-head">
      <h1>Bob Smith</h1>
      <nav class="nav" aria-label="Primary">
        <a href="{{ url_for('index') }}" class="{% if request.path == '/' %}active{% endif %}">Projects</a>
        <a href="{{ url_for('about') }}" class="{% if request.path == '/about' %}active{% endif %}">About</a>
        <a href="{{ url_for('contact') }}" class="{% if request.path == '/contact' %}active{% endif %}">Contact</a>
      </nav>
    </header>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
